name: Daily THSR Auto Booking

on:
  schedule:
    # 每天台灣時間凌晨 2:00 執行 (UTC 18:00 前一天)
    - cron: '0 18 * * *'

  # 允许手动触发
  workflow_dispatch:

jobs:
  auto-booking:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync

      - name: Create .env file from secrets
        run: |
          cat << EOF > .env
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          personal_identification=${{ secrets.PERSONAL_ID }}
          phone_number=${{ secrets.PHONE_NUMBER }}
          email=${{ secrets.EMAIL }}
          EOF

      - name: Run booking bot
        run: |
          uv run python -m thsr_ticket.main --mode auto

      - name: Upload logs (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: booking-logs-${{ github.run_number }}
          path: |
            thsr_ticket/.db/*.json
            *.log
          retention-days: 30
          if-no-files-found: ignore
