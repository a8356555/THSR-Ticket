captcha:
  method: "HYBRID" # "GEMINI", "OCR", "HYBRID" (ocr first then gemini)
  ocr_retries: 5
  gemini_retries: 0

tickets:
  - name: "Friday Home"
    # Available stations: Nangang, Taipei, Banqiao, Taoyuan, Hsinchu, Miaoli, Taichung, Changhua, Yunlin, Chiayi, Tainan, Zuouing
    start_station: "Taipei" 
    dest_station: "Taichung"
    schedule:
      type: "specific" # "specific" (YYYY-MM-DD) or "recurring" (Weekday name)
      value: "2026-02-06"
    time_preference: "17:30" # HH:MM format (24h)
    train_no: "1557" # Optional: specific train number
    ticket_amount:
      adult: 1
      # child: 0
      # disabled: 0
      # elder: 0
      # college: 0
    car_class: "standard" # "standard", "business"
    trip_type: "one-way" # "one-way", "round-trip"
    seat_preference: "none" # "none", "window", "aisle"

